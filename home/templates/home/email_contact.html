<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Contact Message</title>
</head>
<body style="margin:0;padding:0;background-color:#0d1117;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d1117;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#00e5ff,#00ff9d);border-radius:12px 12px 0 0;padding:2px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:#0d1117;border-radius:10px 10px 0 0;padding:32px 40px;text-align:center;">
                    <p style="margin:0 0 8px 0;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#00e5ff;">Portfolio</p>
                    <h1 style="margin:0;font-size:22px;font-weight:700;color:#e8f4f8;">New Contact Message</h1>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#111827;padding:36px 40px;">

              <p style="margin:0 0 28px 0;font-size:14px;color:#6b7280;line-height:1.6;">
                You received a new message through your portfolio contact form.
              </p>

              <!-- Name -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;">
                <tr>
                  <td style="background:#1a2232;border-left:3px solid #00e5ff;border-radius:0 8px 8px 0;padding:14px 20px;">
                    <p style="margin:0 0 4px 0;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#00e5ff;">Full Name</p>
                    <p style="margin:0;font-size:15px;font-weight:600;color:#e8f4f8;">{{ name }}</p>
                  </td>
                </tr>
              </table>

              <!-- Email -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;">
                <tr>
                  <td style="background:#1a2232;border-left:3px solid #8cdcfe;border-radius:0 8px 8px 0;padding:14px 20px;">
                    <p style="margin:0 0 4px 0;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#8cdcfe;">Email</p>
                    <a href="mailto:{{ email }}" style="margin:0;font-size:15px;font-weight:600;color:#8cdcfe;text-decoration:none;">{{ email }}</a>
                  </td>
                </tr>
              </table>

              <!-- Phone -->
              {% if phone %}
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;">
                <tr>
                  <td style="background:#1a2232;border-left:3px solid #00ff9d;border-radius:0 8px 8px 0;padding:14px 20px;">
                    <p style="margin:0 0 4px 0;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#00ff9d;">Phone</p>
                    <p style="margin:0;font-size:15px;font-weight:600;color:#e8f4f8;">{{ phone }}</p>
                  </td>
                </tr>
              </table>
              {% endif %}

              <!-- Message -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:8px;">
                <tr>
                  <td style="background:#1a2232;border-left:3px solid #a78bfa;border-radius:0 8px 8px 0;padding:14px 20px;">
                    <p style="margin:0 0 10px 0;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#a78bfa;">Message</p>
                    <p style="margin:0;font-size:14px;color:#c9d8e8;line-height:1.8;white-space:pre-wrap;">{{ message }}</p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#0d1117;border-top:1px solid #1f2937;border-radius:0 0 12px 12px;padding:24px 40px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#374151;">
                Sent from your portfolio contact form &mdash;
                <a href="mailto:{{ email }}" style="color:#00e5ff;text-decoration:none;">Reply to {{ name }}</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
